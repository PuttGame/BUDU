<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,height=device-height,
      initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>BUDU</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}

/* ===== SCREEN & GAME ===== */
#screen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

#game{
  position:relative;
  width:2400px;
  height:1080px;
  background:black;
  overflow:hidden;
  transform-origin:center;
}

/* ===== BACKGROUND ===== */
.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* ===== MOBIL & BUBU ===== */
#car{
  position:absolute;
  bottom:90px;
  left:820px;
  width:300px;      /* DIKECILKAN LAGI */
  z-index:4;
  display:none;
}

#bubu{
  position:absolute;
  bottom:90px;
  left:1130px;
  width:260px;      /* DIKECILKAN LAGI */
  z-index:5;
  display:none;
}

/* ===== UI GROUP KIRI (AVATAR + ADS) ===== */
#uiLeft{
  position:absolute;
  top:50px;
  left:50px;
  z-index:10;
  display:none;
}

/* 1:1 KECIL */
.ui-11{
  width:72px;
  height:72px;
  display:block;
  margin-bottom:14px;
}

/* 16:9 KECIL */
.ui-169{
  width:360px;
  aspect-ratio:16/9;
  display:block;
  margin-top:12px;
}

/* ===== UI LAIN ===== */
#uiA{top:50px;right:160px;}
#uiSettings{top:50px;right:50px;}

#ui2{top:170px;left:50px;}
#ui3{top:270px;left:50px;}
#ui4{top:370px;left:50px;}

#uiA,#uiSettings,#ui2,#ui3,#ui4{
  position:absolute;
  width:72px;
  height:72px;
  z-index:10;
  display:none;
}

/* START */
#uiStart{
  position:absolute;
  right:70px;
  bottom:70px;
  width:420px;     /* DIKECILKAN */
  aspect-ratio:16/9;
  z-index:10;
  display:none;
}

/* ===== LOADING ===== */
#loadscreen{z-index:2;display:none;}
</style>
</head>

<body>

<div id="screen">
<div id="game">

<!-- BACKGROUND -->
<img src="assets/background/blackscreen.png" id="black1" class="bg">
<img src="assets/background/watermark.png" id="watermark" class="bg" style="display:none">
<img src="assets/background/loadscreen.png" id="loadscreen" class="bg">
<img src="assets/background/garage.png" id="garage" class="bg" style="display:none">

<!-- MOBIL & KARAKTER -->
<img src="assets/car/car.png" id="car">
<img src="assets/character/bubu.gif" id="bubu">

<!-- UI KIRI (AVATAR + ADS — FIXED) -->
<div id="uiLeft">
  <img src="assets/ui/avatar.png" class="ui-11">
  <video class="ui-169" autoplay muted loop playsinline>
    <source src="assets/media/ads.mp4" type="video/mp4">
  </video>
</div>

<!-- UI LAIN -->
<img src="assets/ui/a.png" id="uiA">
<img src="assets/ui/settings.png" id="uiSettings">
<img src="assets/ui/2.png" id="ui2">
<img src="assets/ui/3.png" id="ui3">
<img src="assets/ui/4.png" id="ui4">

<!-- START -->
<img src="assets/media/start.gif" id="uiStart">

<!-- AUDIO -->
<audio id="bgm" src="assets/music/homesong.mp3" loop></audio>

</div>
</div>

<script>
/* ===== SCALE 2400x1080 ===== */
function scaleGame(){
  const g=document.getElementById('game');
  const s=Math.min(
    window.innerWidth/2400,
    window.innerHeight/1080
  );
  g.style.transform=`scale(${s})`;
}
window.addEventListener('load',scaleGame);
window.addEventListener('resize',scaleGame);

/* ===== FLOW (TIDAK DIUBAH) ===== */
setTimeout(()=>{
  black1.style.display="none";
  watermark.style.display="block";
},2000);

setTimeout(()=>{
  watermark.style.display="none";
  black1.style.display="block";
},6000);

setTimeout(()=>{
  black1.style.display="none";
  loadscreen.style.display="block";
},9000);

setTimeout(()=>{
  loadscreen.style.display="none";
  garage.style.display="block";

  car.style.display="block";
  bubu.style.display="block";

  uiLeft.style.display="block";
  uiA.style.display="block";
  uiSettings.style.display="block";
  ui2.style.display="block";
  ui3.style.display="block";
  ui4.style.display="block";
  uiStart.style.display="block";

  bgm.play().catch(()=>{});
},16000);
</script>

</body>
</html>
