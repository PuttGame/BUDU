<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, height=device-height,
      initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>BUDU GAME</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  touch-action: none;
}

/* layar hp */
#screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* game asli */
#game {
  position: relative;
  width: 2400px;
  height: 1080px;
  background: black;
  transform-origin: center center;
  overflow: hidden;
}

/* loading */
#loading {
  position: absolute;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#loading img {
  width: 600px;
}

/* GARAGE */
#garage {
  position: absolute;
  inset: 0;
  display: none;
}

#garage-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* mobil */
#car {
  position: absolute;
  bottom: 120px;
  left: 850px;
  width: 420px;
}

/* bubu */
#bubu {
  position: absolute;
  bottom: 120px;
  left: 1320px;
  width: 360px;
}

/* START */
#startBtn {
  position: absolute;
  right: 150px;
  bottom: 180px;
  width: 520px;
}
</style>
</head>

<body>

<div id="screen">
  <div id="game">

    <!-- LOADING -->
    <div id="loading">
      <img src="assets/loadscreen.png">
    </div>

    <!-- GARAGE -->
    <div id="garage">
      <img id="garage-bg" src="assets/garage.png">

      <img id="car" src="assets/mobil.png">
      <img id="bubu" src="assets/bubu.gif">

      <img id="startBtn" src="assets/start.png">
    </div>

    <!-- AUDIO -->
    <audio id="bgm" src="assets/homesong.mp3" loop></audio>

  </div>
</div>

<script>
/* SCALE FIXED MOBILE */
function scaleGame() {
  const game = document.getElementById('game');
  const scaleX = window.innerWidth / 2400;
  const scaleY = window.innerHeight / 1080;
  const scale = Math.min(scaleX, scaleY);
  game.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', scaleGame);
window.addEventListener('orientationchange', scaleGame);
window.addEventListener('load', scaleGame);

/* LOADING FLOW */
const loading = document.getElementById('loading');
const garage = document.getElementById('garage');
const bgm = document.getElementById('bgm');

/* loading agak lama */
setTimeout(() => {
  loading.style.display = 'none';
  garage.style.display = 'block';

  /* music NYALA SAAT garage muncul */
  bgm.play().catch(()=>{});

}, 2500); // << bisa kamu naikin lagi
</script>

</body>
</html>
