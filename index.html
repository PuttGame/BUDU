<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BUDU</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: sans-serif;
}

/* Container utama */
#app {
    position: relative;
    width: 100%;
    height: 100%;
}

/* Background fullscreen */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
}

/* Loading text */
#loadingText {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    letter-spacing: 2px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
</style>
</head>
<body>

<div id="app">

    <!-- Loading Screen -->
    <img id="loadingScreen" class="screen" src="assets/background/loadscreen.png">
    <div id="loadingText">LOADING...</div>

    <!-- Garage Screen -->
    <img id="garageScreen" class="screen" src="assets/background/garage.png" style="display:none;">

</div>

<script>

// Register Service Worker
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

// Simulasi loading 3 detik
setTimeout(() => {
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("loadingText").style.display = "none";
    document.getElementById("garageScreen").style.display = "block";
}, 3000);

</script>

</body>
</html>
