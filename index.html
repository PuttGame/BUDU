<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDU</title>
  
  <!-- PWA Tags -->
  <link rel="manifest" href="/BUDU/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .preview { min-height: 100dvh; }
    .game-mode { height: 100dvh; overflow: hidden; }
    .logo { box-shadow: 0 0 60px -10px rgb(59 130 246); }
  </style>
</head>
<body class="bg-black text-white">

  <div id="preview" class="preview flex flex-col items-center justify-center bg-gradient-to-b from-zinc-950 to-black">
    <div class="text-center">
      <img src="/BUDU/assets/logo.png" alt="BUDU Logo" 
           class="logo w-52 h-52 mx-auto rounded-3xl border-4 border-blue-500/30 object-cover">
      <h1 class="mt-10 text-7xl font-black tracking-widest">BUDU</h1>
      <p class="mt-2 text-blue-400 text-xl">Game Seru • Installable</p>
    </div>

    <div class="fixed bottom-8 left-0 right-0 px-6">
      <button id="installBtn"
              class="w-full bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 py-5 rounded-3xl text-2xl font-bold shadow-2xl shadow-blue-500/50 active:scale-95 transition">
        INSTALL SEKARANG
      </button>
      <p class="text-center text-zinc-500 text-sm mt-4">Jadikan seperti aplikasi asli di HP kamu</p>
    </div>
  </div>

  <div id="game" class="game-mode hidden flex flex-col bg-black items-center justify-center">
    <div class="text-center p-6">
      <h2 class="text-5xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">
        BUDU GAME
      </h2>
      <p class="text-zinc-400 mb-10 text-xl">Mode Landscape • Fullscreen</p>
      
      <div class="w-full max-w-md aspect-video bg-zinc-900 border border-zinc-700 rounded-2xl flex items-center justify-center">
        <p class="text-3xl text-zinc-600">GAME AREA<br>(masukkan kode game di sini)</p>
      </div>
    </div>
  </div>

  <script>
    tailwind.config = { content: ["*"] }

    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('Event beforeinstallprompt berhasil di-trigger!');
      e.preventDefault();
      deferredPrompt = e;
    });

    function isInstalled() {
      const isStandalone = 
        window.matchMedia('(display-mode: standalone)').matches ||
        navigator.standalone === true ||
        window.navigator.standalone === true;
      
      console.log('isInstalled check:', {
        matchMedia: window.matchMedia('(display-mode: standalone)').matches,
        navigatorStandalone: navigator.standalone,
        windowStandalone: window.navigator.standalone
      });
      
      return isStandalone;
    }

    function initMode() {
      const standalone = isInstalled();
      console.log('initMode: standalone mode?', standalone);

      if (standalone) {
        document.getElementById('preview').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        
        // Coba lock orientation ke landscape
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(err => {
            console.log('Orientation lock gagal:', err);
          });
        }
        
        // Coba masuk fullscreen
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
            console.log('Fullscreen gagal:', err);
          });
        }
      } else {
        document.getElementById('preview').classList.remove('hidden');
        document.getElementById('game').classList.add('hidden');
      }
    }

    async function triggerInstall() {
      if (!deferredPrompt) {
        alert("Prompt install masih belum muncul.\n\nCek:\n1. DevTools > Application > Manifest (no error?)\n2. Service Workers registered?\n3. Reload 2-3x\n4. Pakai Chrome Android terbaru");
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      if (outcome === 'accepted') {
        console.log('Install diterima user');
        setTimeout(() => location.reload(), 800);
      } else {
        console.log('Install dibatalkan user');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('installBtn')?.addEventListener('click', triggerInstall);
      initMode();
      window.addEventListener('appinstalled', () => {
        console.log('App berhasil di-install');
        setTimeout(() => location.reload(), 500);
      });
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/BUDU/sw.js')
          .then(reg => {
            console.log('Service Worker registered! Scope:', reg.scope);
          })
          .catch(err => {
            console.error('Service Worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
