<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDU</title>
  
  <!-- PWA Tags -->
  <link rel="manifest" href="/BUDU/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin:0; overflow:hidden; background:#000; }
    #splash-sequence { position:fixed; inset:0; z-index:9999; background:#000; display:flex; align-items:center; justify-content:center; }
    #splash-img { max-width:100%; max-height:100%; opacity:0; transition:opacity 1.2s ease-in-out; }
    #loading-screen { position:fixed; inset:0; z-index:9998; background:#000; display:none; align-items:center; justify-content:center; }
    #loading-screen img { max-width:100%; max-height:100%; object-fit:contain; }
    #loading-text-container { position:absolute; bottom:2rem; right:2rem; color:#fff; font-size:1.5rem; font-weight:bold; display:flex; align-items:center; gap:1rem; opacity:0; transition:opacity 0.8s; }
    .spinner {
      width: 2.5rem; height: 2.5rem;
      border: 4px solid #4f46e5; border-top: 4px solid transparent;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { opacity:1 !important; }
    .fade-out { opacity:0 !important; }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Splash & Loading Sequence (hanya untuk mode app) -->
  <div id="splash-sequence" class="hidden">
    <img id="splash-img" src="/BUDU/assets/splashscreen.png" alt="Splash">
  </div>

  <div id="loading-screen" class="hidden">
    <img src="/BUDU/assets/loadscreen.png" alt="Loading Background">
    <div id="loading-text-container">
      <div class="spinner"></div>
      <span id="loading-text">Loading...</span>
    </div>
  </div>

  <!-- MODE PREVIEW – tampilan awal di browser biasa -->
  <div id="preview" class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-zinc-950 to-black">
    <div class="text-center">
      <img src="/BUDU/assets/logo.png" alt="BUDU Logo" 
           class="w-52 h-52 mx-auto rounded-3xl border-4 border-blue-500/30 object-cover">
      <h1 class="mt-10 text-7xl font-black tracking-widest">BUDU</h1>
      <p class="mt-2 text-blue-400 text-xl">Game Seru • Installable</p>
    </div>

    <div class="fixed bottom-8 left-0 right-0 px-6">
      <button id="installBtn"
              class="w-full bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 py-5 rounded-3xl text-2xl font-bold shadow-2xl shadow-blue-500/50 active:scale-95 transition">
        INSTALL SEKARANG
      </button>
      <p class="text-center text-zinc-500 text-sm mt-4">Jadikan seperti aplikasi asli di HP kamu</p>
    </div>
  </div>

  <!-- MODE GAME – hanya setelah install -->
  <div id="game" class="hidden flex flex-col bg-black items-center justify-center min-h-screen">
    <div class="text-center p-6">
      <h2 class="text-5xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">
        BUDU GAME
      </h2>
      <p class="text-zinc-400 mb-10 text-xl">Mode Landscape • Fullscreen</p>
      
      <div class="w-full max-w-md aspect-video bg-zinc-900 border border-zinc-700 rounded-2xl flex items-center justify-center">
        <p class="text-3xl text-zinc-600">GAME AREA<br>(masukkan kode game di sini)</p>
      </div>
    </div>
  </div>

  <script>
    tailwind.config = { content: ["*"] }

    let deferredPrompt = null;

    // Fungsi pengecekan mode app (lebih ketat)
    function isInstalled() {
      const mediaStandalone = window.matchMedia('(display-mode: standalone)').matches;
      const navStandalone = !!navigator.standalone;
      const winStandalone = !!window.navigator.standalone;
      const isFullScreen = !!(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.mozFullScreenElement ||
        document.msFullscreenElement
      );

      // Harus standalone DAN fullscreen (lebih akurat, hindari false positive di browser)
      return (mediaStandalone || navStandalone || winStandalone) && isFullScreen;
    }

    // Jalankan splash hanya di mode app
    function runSplashSequence() {
      const seq = document.getElementById('splash-sequence');
      const img = document.getElementById('splash-img');
      const loadingScreen = document.getElementById('loading-screen');
      const loadingText = document.getElementById('loading-text');
      const loadingContainer = document.getElementById('loading-text-container');

      seq.classList.remove('hidden');

      setTimeout(() => {
        img.classList.add('fade-in');
        setTimeout(() => {
          img.classList.remove('fade-in');
          img.classList.add('fade-out');
          setTimeout(() => {
            seq.classList.add('hidden');
            setTimeout(() => {
              loadingScreen.classList.remove('hidden');
              setTimeout(() => {
                loadingContainer.style.opacity = '1';

                const randomDuration = Math.floor(Math.random() * (15000 - 8000 + 1)) + 8000;

                setTimeout(() => {
                  loadingText.textContent = 'PASS';
                  loadingContainer.querySelector('.spinner').style.display = 'none';

                  setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                    document.getElementById('game').classList.remove('hidden');

                    // Paksa landscape + fullscreen lagi (jaga-jaga)
                    if (screen.orientation && screen.orientation.lock) {
                      screen.orientation.lock('landscape').catch(() => {});
                    }
                    if (!document.fullscreenElement) {
                      document.documentElement.requestFullscreen().catch(() => {});
                    }
                  }, 1500);
                }, randomDuration);
              }, 5000);
            }, 3000);
          }, 1200);
        }, 3000);
      }, 3000);
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      const installed = isInstalled();

      if (installed) {
        // Mode app → sembunyikan preview, jalankan splash → game
        document.getElementById('preview').classList.add('hidden');
        runSplashSequence();
      } else {
        // Mode browser biasa → tampilkan preview saja
        document.getElementById('preview').classList.remove('hidden');
        document.getElementById('game').classList.add('hidden');
        // Pastikan splash & loading tetap hidden
        document.getElementById('splash-sequence').classList.add('hidden');
        document.getElementById('loading-screen').classList.add('hidden');
      }

      // Handler tombol install
      document.getElementById('installBtn')?.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          if (outcome === 'accepted') {
            setTimeout(() => location.reload(), 800);
          }
        } else {
          alert("Prompt install belum tersedia. Coba buka menu browser → Install app");
        }
      });

      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
      });

      window.addEventListener('appinstalled', () => {
        setTimeout(() => location.reload(), 500);
      });
    });
  </script>
</body>
</html>
