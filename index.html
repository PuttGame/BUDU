<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BUDU</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Semua layar */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
}

/* Loading kecil kanan bawah */
#loadingContainer {
    position: absolute;
    bottom: 15px;
    right: 15px;
    display: none;
    align-items: center;
    color: white;
    font-size: 12px;
    font-family: sans-serif;
}

.spinner {
    width: 12px;
    height: 12px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    margin-right: 6px;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ================= TAMBAHAN (TIDAK MENGUBAH YANG LAIN) ================= */
#bg-garage-load {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: none;
    z-index: 999;
}
/* ================= AKHIR TAMBAHAN ================= */

</style>
</head>
<body>

<img id="screen1" class="screen" src="assets/background/blackscreen.png">
<img id="screen2" class="screen" src="assets/background/garage.png" style="display:none;">
<img id="screen3" class="screen" src="assets/background/watermark.png" style="display:none;">

<div id="loadingContainer">
    <div class="spinner"></div>
    <div>Loading...</div>
</div>

<audio id="homeMusic" src="assets/music/homesong.mp3" loop></audio>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const loading = document.getElementById("loadingContainer");
    loading.style.display = "flex";

    setTimeout(() => {
        loading.style.display = "none";
        document.getElementById("screen1").style.display = "none";
        document.getElementById("screen2").style.display = "block";

        const music = document.getElementById("homeMusic");
        music.play().catch(()=>{});
    }, 2000);
});
</script>

<!-- ================= TAMBAHAN (SETELAH LOAD SELESAI) ================= -->
<img id="bg-garage-load" src="assets/background/bggarage.png" alt="Garage Background">

<script>
window.addEventListener("load", function () {
    var bg = document.getElementById("bg-garage-load");
    if (bg) {
        bg.style.display = "block";
    }
});
</script>
<!-- ================= AKHIR TAMBAHAN ================= -->

</body>
</html>
