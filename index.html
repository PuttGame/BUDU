<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUDU</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* UI COMMON */
.ui {
    position: absolute;
    z-index: 10;
}

/* 1:1 ICONS */
.square {
    width: 64px;
    height: 64px;
    object-fit: contain;
}

/* 16:9 MEDIA */
.ratio169 {
    width: 320px;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: black;
}

/* POSITIONS */
#avatar { top: 20px; left: 20px; }
#yellow { top: 20px; right: 120px; }
#settings { top: 20px; right: 20px; }

#green { top: 120px; left: 20px; }
#purple { top: 200px; left: 20px; }
#red { top: 280px; left: 20px; }

#startGif { bottom: 20px; right: 20px; }
#adsVideo { top: 120px; left: 120px; }

/* CHARACTER & CAR */
#bubu {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    height: 60%;
    z-index: 5;
}

#car {
    position: absolute;
    bottom: 0;
    left: 30%;
    height: 30%;
    z-index: 4;
}
</style>
</head>

<body>

<!-- EXISTING BACKGROUNDS -->
<img src="assets/background/blackscreen.png" id="black1" class="bg">
<img src="assets/background/watermark.png" id="watermark" class="bg" style="display:none;">
<img src="assets/background/garage.png" id="garage" class="bg" style="display:none;">

<!-- EXISTING CHARACTER -->
<img src="assets/character/bubu.gif" id="bubu" style="display:none;">
<img src="assets/car/car.png" id="car" style="display:none;">

<!-- 🔵 AVATAR 1:1 -->
<img src="assets/ui/avatar.png" id="avatar" class="ui square">

<!-- 🟡 a.png -->
<img src="assets/ui/a.png" id="yellow" class="ui square">

<!-- ⚪ SETTINGS -->
<img src="assets/ui/settings.png" id="settings" class="ui square">

<!-- 🟢 2.png -->
<img src="assets/ui/2.png" id="green" class="ui square">

<!-- 🟣 3.png -->
<img src="assets/ui/3.png" id="purple" class="ui square">

<!-- 🔴 4.png -->
<img src="assets/ui/4.png" id="red" class="ui square">

<!-- 🔷 START GIF 16:9 -->
<img src="assets/media/start.gif" id="startGif" class="ui ratio169">

<!-- 🌸 ADS VIDEO 16:9 -->
<video id="adsVideo" class="ui ratio169" autoplay muted loop>
    <source src="assets/media/ads.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="bgm" src="assets/music/homesong.mp3" loop></audio>

<script>
const black1 = document.getElementById("black1");
const watermark = document.getElementById("watermark");
const garage = document.getElementById("garage");
const bubu = document.getElementById("bubu");
const car = document.getElementById("car");
const bgm = document.getElementById("bgm");

setTimeout(() => {
    black1.style.display = "none";
    watermark.style.display = "block";
}, 2000);

setTimeout(() => {
    watermark.style.display = "none";
    black1.style.display = "block";
}, 6000);

setTimeout(() => {
    black1.style.display = "none";
    garage.style.display = "block";
    bubu.style.display = "block";
    car.style.display = "block";
}, 13000);

// autoplay unlock
document.body.addEventListener("click", () => {
    bgm.play();
}, { once: true });
</script>

</body>
</html>
