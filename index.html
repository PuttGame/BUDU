<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BUDU</title>

<!-- PWA tetap ada -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Semua layar */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
}

/* Loading kecil kanan bawah */
#loadingContainer {
    position: absolute;
    bottom: 15px;
    right: 15px;
    display: none;
    align-items: center;
    color: white;
    font-size: 12px;
    font-family: sans-serif;
}

/* Animasi spinner */
.spinner {
    width: 12px;
    height: 12px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    margin-right: 6px;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Posisi Bubu & Mobil */
#bubu {
    position: absolute;
    height: 40%;
    top: 50%;
    left: 60%;
    transform: translate(-50%, -50%);
    display: none;
}

#car {
    position: absolute;
    height: 30%;
    top: 65%;
    left: 72%;
    transform: translate(-50%, -50%);
    display: none;
}
</style>
</head>

<body>

<!-- Tahap layar -->
<div id="black1" class="screen" style="background:black;"></div>
<img id="watermark" class="screen" src="assets/background/watermark.png" style="display:none;">
<div id="black2" class="screen" style="background:black; display:none;"></div>
<img id="loadscreen" class="screen" src="assets/background/loadscreen.png" style="display:none;">
<img id="garage" class="screen" src="assets/background/garage.png" style="display:none;">

<!-- Karakter -->
<img id="bubu" src="assets/karakter/bubu.gif">
<img id="car" src="assets/car/car.png">

<!-- Loading kecil -->
<div id="loadingContainer">
    <div class="spinner"></div>
    <div>loading</div>
</div>

<!-- Musik -->
<audio id="homesong" src="assets/music/homesong.mp3" loop></audio>

<script>

/* SERVICE WORKER (JANGAN DIUBAH) */
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js");
    });
}

/* Timeline sesuai permintaan */

setTimeout(() => {
    black1.style.display = "none";
    watermark.style.display = "block";
}, 2000); // hitam 2 detik

setTimeout(() => {
    watermark.style.display = "none";
    black2.style.display = "block";
}, 6000); // watermark 4 detik

setTimeout(() => {
    black2.style.display = "none";
    loadscreen.style.display = "block";
}, 9000); // hitam 3 detik

setTimeout(() => {
    loadingContainer.style.display = "flex";
}, 13000); // loadscreen muncul 4 detik baru loading kecil

setTimeout(() => {
    loadscreen.style.display = "none";
    loadingContainer.style.display = "none";

    garage.style.display = "block";
    bubu.style.display = "block";
    car.style.display = "block";

    // aktifkan musik
    const music = document.getElementById("homesong");
    music.play().catch(() => {
        document.body.addEventListener("click", () => {
            music.play();
        }, { once: true });
    });

}, 21000); // loading 8 detik

</script>

</body>
</html>
