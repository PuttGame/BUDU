<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDU</title>
  
  <!-- PWA Tags -->
  <link rel="manifest" href="/BUDU/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="background-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; padding: 0; 
      overflow: hidden; 
      background: #000; 
    }
    .hidden { display: none !important; }
    .preview, .game-mode, #loadingOverlay, #orientationBlock { 
      position: fixed; inset: 0; z-index: 10; 
    }
    .preview { 
      background: linear-gradient(to bottom, #0a0a0f, #000); 
      display: flex; align-items: center; justify-content: center; 
    }
    .game-mode { 
      background: #000; 
      display: flex; align-items: center; justify-content: center; 
    }
    #loadingOverlay { 
      transition: opacity 0.6s ease; 
      background: #000; 
      z-index: 9999; 
    }
    #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
    #orientationBlock { 
      background: rgba(0,0,0,0.95); 
      color: white; 
      flex-direction: column; 
      text-align: center; 
      justify-content: center; 
    }
    #passText { 
      font-size: 1.2rem; 
      color: #4b5563; 
      font-weight: 400; 
      letter-spacing: 0.1em; 
    }
    .rotate-icon { 
      font-size: 5rem; 
      animation: rotate 2s linear infinite; 
    }
    @keyframes rotate { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(90deg); } 
    }
    /* Hilangkan highlight & border focus */
    :focus, :focus-visible { outline: none !important; }
    * { -webkit-tap-highlight-color: transparent !important; }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Loading sequence -->
  <div id="loadingOverlay" class="flex items-center justify-center hidden">
    <img id="loadingImage" src="/BUDU/assets/blackscreen.png" alt="Loading" class="w-full h-full object-cover">
  </div>

  <!-- Blokir kalau bukan landscape -->
  <div id="orientationBlock" class="flex hidden">
    <div>
      <div class="rotate-icon mb-6">↻</div>
      <h2 class="text-3xl font-bold mb-4">Putar ke Landscape</h2>
      <p class="text-xl text-zinc-300">Game hanya bisa dimainkan dalam mode landscape.</p>
      <p class="text-sm text-zinc-500 mt-8">Putar HP-mu secara horizontal untuk mulai.</p>
    </div>
  </div>

  <!-- Preview (install page) -->
  <div id="preview">
    <div class="flex flex-col items-center justify-center h-full">
      <div class="text-center">
        <img src="/BUDU/assets/logo.png" alt="BUDU Logo" 
             class="logo w-52 h-52 mx-auto rounded-3xl border-4 border-blue-500/30 object-cover">
        <h1 class="mt-10 text-7xl font-black tracking-widest">BUDU</h1>
        <p class="mt-2 text-blue-400 text-xl">Game Seru • Installable</p>
      </div>

      <div class="fixed bottom-8 left-0 right-0 px-6">
        <button id="installBtn" class="w-full bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 py-5 rounded-3xl text-2xl font-bold shadow-2xl shadow-blue-500/50 active:scale-95 transition">
          INSTALL SEKARANG
        </button>
        <p class="text-center text-zinc-500 text-sm mt-4">Jadikan seperti aplikasi asli di HP kamu</p>
      </div>
    </div>
  </div>

  <!-- Game content minimal -->
  <div id="game" class="game-mode hidden">
    <p id="passText">pass</p>
  </div>

  <script>
    tailwind.config = { content: ["*"] }

    let deferredPrompt = null;
    const INSTALLED_FLAG = 'budu_installed';

    if (localStorage.getItem(INSTALLED_FLAG) === 'true') {
      document.getElementById('preview').classList.add('hidden');
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    function isInstalled() {
      const standalone = window.matchMedia('(display-mode: standalone)').matches ||
                         window.matchMedia('(display-mode: fullscreen)').matches ||
                         navigator.standalone === true ||
                         window.navigator.standalone === true;
      const flagged = localStorage.getItem(INSTALLED_FLAG) === 'true';
      return standalone || flagged;
    }

    function isLandscape() {
      return window.matchMedia('(orientation: landscape)').matches;
    }

    function checkAndLockOrientation() {
      if (isLandscape()) {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
        document.getElementById('orientationBlock').classList.add('hidden');
        return true;
      } else {
        document.getElementById('orientationBlock').classList.remove('hidden');
        return false;
      }
    }

    function showLoadingSequence(callback) {
      const overlay = document.getElementById('loadingOverlay');
      const img = document.getElementById('loadingImage');

      overlay.classList.remove('hidden');
      img.src = '/BUDU/assets/blackscreen.png';

      setTimeout(() => {
        img.src = '/BUDU/assets/splashscreen.png';
        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.classList.add('hidden');
            callback();
          }, 600);
        }, 3000);
      }, 3000);
    }

    function initMode() {
      const installed = isInstalled();

      if (installed) {
        document.getElementById('preview').classList.add('hidden');

        if (checkAndLockOrientation()) {
          showLoadingSequence(() => {
            document.getElementById('game').classList.remove('hidden');
          });
        }
      } else {
        document.getElementById('preview').classList.remove('hidden');
        document.getElementById('game').classList.add('hidden');
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('orientationBlock').classList.add('hidden');
      }
    }

    window.matchMedia('(orientation: landscape)').addEventListener('change', (e) => {
      if (isInstalled()) {
        if (e.matches) {
          checkAndLockOrientation();
          if (document.getElementById('game').classList.contains('hidden')) {
            showLoadingSequence(() => {
              document.getElementById('game').classList.remove('hidden');
            });
          }
        } else {
          document.getElementById('game').classList.add('hidden');
          document.getElementById('orientationBlock').classList.remove('hidden');
        }
      }
    });

    async function triggerInstall() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          localStorage.setItem(INSTALLED_FLAG, 'true');
        }
        deferredPrompt = null;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('installBtn')?.addEventListener('click', triggerInstall);
      initMode();

      window.addEventListener('appinstalled', () => {
        localStorage.setItem(INSTALLED_FLAG, 'true');
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/BUDU/sw.js');
      });
    }
  </script>
</body>
</html>
