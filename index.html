<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDU</title>
  
  <link rel="manifest" href="/BUDU/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="background-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      margin: 0; padding: 0; overflow: hidden; background: #000; 
      font-family: system-ui, -apple-system, sans-serif; 
    }
    .hidden { display: none !important; }
    #loadingOverlay, #preview, #game, #orientationBlock { 
      position: fixed; inset: 0; z-index: 10; 
    }
    #preview { 
      background: linear-gradient(to bottom, #0a0a0f, #000); 
      display: flex; align-items: center; justify-content: center; 
    }
    #game { 
      background: #000; 
      display: flex; align-items: center; justify-content: center; 
    }
    #loadingOverlay { 
      background: #000; z-index: 9999; 
      transition: opacity 0.8s ease; 
    }
    #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
    #loadingImage, #watermarkImg { 
      width: 100%; height: 100%; 
      object-fit: contain; object-position: center; 
      position: absolute; top: 0; left: 0; 
    }
    #watermarkImg { 
      opacity: 0; 
      transition: opacity 1.2s ease-in-out; 
    }
    #loadingContent { 
      position: absolute; bottom: 20px; right: 20px; 
      display: flex; align-items: center; gap: 12px; 
      color: #6b7280; font-size: 0.9rem; z-index: 20; 
    }
    .spinner {
      width: 20px; height: 20px; 
      border: 3px solid #4b5563; 
      border-top: 3px solid #9ca3af; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #passText { 
      font-size: 2rem; 
      color: #4b5563; 
      letter-spacing: 0.2em; 
      text-align: center; 
    }
    #orientationBlock { 
      background: rgba(0,0,0,0.95); color: white; 
      display: flex; align-items: center; justify-content: center; 
      flex-direction: column; text-align: center; 
    }
    .rotate-icon { font-size: 6rem; animation: rotate 2s linear infinite; }
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(90deg); } }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Overlay loading utama -->
  <div id="loadingOverlay" class="flex items-center justify-center relative">
    <img id="loadingImage" src="/BUDU/assets/blackscreen.png" alt="" class="w-full h-full object-cover">
    <img id="watermarkImg" src="/BUDU/assets/watermark.png" alt="Watermark">
    <div id="loadingContent" class="hidden">
      <div class="spinner"></div>
      <span>Loading...</span>
    </div>
  </div>

  <!-- Blokir kalau bukan landscape -->
  <div id="orientationBlock" class="hidden flex">
    <div>
      <div class="rotate-icon mb-8">↻</div>
      <h2 class="text-3xl font-bold mb-4">Putar ke Landscape</h2>
      <p class="text-xl text-zinc-300 px-6">Game hanya bisa dimainkan dalam mode landscape.</p>
    </div>
  </div>

  <!-- Preview install -->
  <div id="preview" class="hidden">
    <div class="flex flex-col items-center justify-center h-full">
      <div class="text-center">
        <img src="/BUDU/assets/logo.png" alt="BUDU Logo" class="w-52 h-52 mx-auto rounded-3xl border-4 border-blue-500/30 object-cover shadow-2xl">
        <h1 class="mt-10 text-7xl font-black tracking-widest">BUDU</h1>
        <p class="mt-2 text-blue-400 text-xl">Game Seru • Installable</p>
      </div>
      <div class="fixed bottom-8 left-0 right-0 px-6">
        <button id="installBtn" class="w-full bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 py-5 rounded-3xl text-2xl font-bold shadow-2xl shadow-blue-500/50 active:scale-95 transition">
          INSTALL SEKARANG
        </button>
        <p class="text-center text-zinc-500 text-sm mt-4">Jadikan seperti aplikasi asli di HP kamu</p>
      </div>
    </div>
  </div>

  <!-- Halaman akhir: pass di tengah -->
  <div id="game" class="hidden flex items-center justify-center">
    <p id="passText">pass</p>
  </div>

  <script>
    const INSTALLED_FLAG = 'budu_installed';

    if (localStorage.getItem(INSTALLED_FLAG) === 'true') {
      document.getElementById('preview').classList.add('hidden');
    }

    function isInstalled() {
      const standalone = window.matchMedia('(display-mode: standalone)').matches ||
                         window.matchMedia('(display-mode: fullscreen)').matches ||
                         navigator.standalone === true ||
                         window.navigator.standalone === true;
      return standalone || localStorage.getItem(INSTALLED_FLAG) === 'true';
    }

    function isLandscape() {
      return window.matchMedia('(orientation: landscape)').matches;
    }

    function startLoadingSequence() {
      const overlay = document.getElementById('loadingOverlay');
      const img = document.getElementById('loadingImage');
      const watermark = document.getElementById('watermarkImg');
      const loadingContent = document.getElementById('loadingContent');

      // 1. Blackscreen 3 detik
      img.src = '/BUDU/assets/blackscreen.png';
      overlay.classList.remove('hidden');

      setTimeout(() => {
        // 2. Watermark 4 detik (fade in-out)
        watermark.style.opacity = '1';
        setTimeout(() => {
          watermark.style.opacity = '0';
        }, 2500);

        setTimeout(() => {
          // 3. Blackscreen lagi 4 detik
          watermark.style.opacity = '0';
          img.src = '/BUDU/assets/blackscreen.png';

          setTimeout(() => {
            // 4. Loadscreen + loading indicator
            img.src = '/BUDU/assets/loadscreen.png';
            loadingContent.classList.remove('hidden');

            // Random 8-15 detik
            const randomDuration = Math.floor(Math.random() * (15000 - 8000 + 1)) + 8000;

            setTimeout(() => {
              // Selesai → hilangkan overlay, tampilkan "pass" di tengah
              overlay.style.opacity = '0';
              setTimeout(() => {
                overlay.classList.add('hidden');
                loadingContent.classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
              }, 800);
            }, randomDuration);
          }, 4000);
        }, 4000);
      }, 3000);
    }

    function initApp() {
      if (isInstalled()) {
        document.getElementById('preview').classList.add('hidden');

        if (isLandscape()) {
          startLoadingSequence();
        } else {
          document.getElementById('orientationBlock').classList.remove('hidden');
        }
      } else {
        document.getElementById('preview').classList.remove('hidden');
        document.getElementById('orientationBlock').classList.add('hidden');
      }
    }

    window.matchMedia('(orientation: landscape)').addEventListener('change', (e) => {
      if (isInstalled()) {
        if (e.matches) {
          document.getElementById('orientationBlock').classList.add('hidden');
          if (document.getElementById('game').classList.contains('hidden')) {
            startLoadingSequence();
          }
        } else {
          document.getElementById('game').classList.add('hidden');
          document.getElementById('orientationBlock').classList.remove('hidden');
        }
      }
    });

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    document.getElementById('installBtn')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          localStorage.setItem(INSTALLED_FLAG, 'true');
        }
        deferredPrompt = null;
      }
    });

    window.addEventListener('appinstalled', () => {
      localStorage.setItem(INSTALLED_FLAG, 'true');
    });

    document.addEventListener('DOMContentLoaded', initApp);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/BUDU/sw.js');
      });
    }
  </script>
</body>
</html>
