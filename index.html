<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUDU</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* BACKGROUND */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CHARACTER */
#bubu {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  height: 60%;
  z-index: 5;
  display: none;
}

#car {
  position: absolute;
  bottom: 0;
  left: 30%;
  height: 30%;
  z-index: 4;
  display: none;
}
</style>
</head>

<body>

<!-- BACKGROUND FLOW (LAMA) -->
<img src="assets/background/blackscreen.png" id="black1" class="bg">
<img src="assets/background/watermark.png" id="watermark" class="bg" style="display:none;">
<img src="assets/background/garage.png" id="garage" class="bg" style="display:none;">

<!-- CHARACTER (LAMA) -->
<img src="assets/character/bubu.gif" id="bubu">
<img src="assets/car/car.png" id="car">

<!-- ================= TAMBAHAN UI (HIDDEN) ================= -->

<img id="uiAvatar" src="assets/ui/avatar.png"
style="position:absolute;top:20px;left:20px;width:64px;height:64px;display:none;z-index:10;">

<img id="uiA" src="assets/ui/a.png"
style="position:absolute;top:20px;right:120px;width:64px;height:64px;display:none;z-index:10;">

<img id="uiSettings" src="assets/ui/settings.png"
style="position:absolute;top:20px;right:20px;width:64px;height:64px;display:none;z-index:10;">

<img id="ui2" src="assets/ui/2.png"
style="position:absolute;top:120px;left:20px;width:64px;height:64px;display:none;z-index:10;">

<img id="ui3" src="assets/ui/3.png"
style="position:absolute;top:200px;left:20px;width:64px;height:64px;display:none;z-index:10;">

<img id="ui4" src="assets/ui/4.png"
style="position:absolute;top:280px;left:20px;width:64px;height:64px;display:none;z-index:10;">

<img id="uiStart" src="assets/media/start.gif"
style="position:absolute;bottom:20px;right:20px;width:320px;aspect-ratio:16/9;display:none;z-index:10;">

<video id="uiAds" autoplay muted loop
style="position:absolute;top:120px;left:120px;width:320px;aspect-ratio:16/9;display:none;z-index:10;">
  <source src="assets/media/ads.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="bgm" src="assets/music/homesong.mp3" loop></audio>

<script>
/* ===== VAR LAMA ===== */
black1 = document.getElementById("black1");
watermark = document.getElementById("watermark");
garage = document.getElementById("garage");
bubu = document.getElementById("bubu");
car = document.getElementById("car");
bgm = document.getElementById("bgm");

/* ===== VAR TAMBAHAN ===== */
uiAvatar = document.getElementById("uiAvatar");
uiA = document.getElementById("uiA");
uiSettings = document.getElementById("uiSettings");
ui2 = document.getElementById("ui2");
ui3 = document.getElementById("ui3");
ui4 = document.getElementById("ui4");
uiStart = document.getElementById("uiStart");
uiAds = document.getElementById("uiAds");

/* ===== FLOW LAMA ===== */
setTimeout(() => {
  black1.style.display = "none";
  watermark.style.display = "block";
}, 2000);

setTimeout(() => {
  watermark.style.display = "none";
  black1.style.display = "block";
}, 6000);

setTimeout(() => {
  black1.style.display = "none";
  garage.style.display = "block";
  bubu.style.display = "block";
  car.style.display = "block";

  /* ===== MUNCULKAN UI BARU ===== */
  uiAvatar.style.display = "block";
  uiA.style.display = "block";
  uiSettings.style.display = "block";
  ui2.style.display = "block";
  ui3.style.display = "block";
  ui4.style.display = "block";
  uiStart.style.display = "block";
  uiAds.style.display = "block";

}, 13000);

/* AUTOPLAY UNLOCK */
document.body.addEventListener("click", () => {
  bgm.play();
}, { once: true });

/* PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
